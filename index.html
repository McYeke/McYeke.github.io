<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation - Loading Screen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .background {
            background-image: url('assets/scp-background.webp');
            background-size: cover;
            background-position: center;
            height: 100vh;
            padding-top: 10%;
        }

        .header {
            filter: drop-shadow(black 0.2rem 0.2rem 5px);
        }

        .centered-logo img {
            margin-top: -200px;
            position: relative;
            display: block;
            margin-left: auto;
            margin-right: auto;
            filter: drop-shadow(black 1rem 1rem 5px);
        }

        .brand-logo img {
            width: 200px; /* Adjust width */
            height: auto;  /* Maintain aspect ratio */
            position: absolute;
            top: 40px;    /* Move logo to the top */
            left: 45%;   /* Align logo to the top-left */
            z-index: 2;   /* Ensure it's above other elements */
            filter: drop-shadow(black 0.2rem 0.2rem 5px);
        }

        .audio-controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #volume-control {
            width: 100px;
        }

        .loading-bar {
            width: 100%;
            background-color: #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress {
            width: 0;
            height: 20px;
            background-color: #4caf50;
            animation: progressBarAnimation 10s ease-in-out infinite;
        }

        @keyframes progressBarAnimation {
            0% {
                width: 0;
            }
            5% {
                width: 5%;
            }
            15% {
                width: 15%;
            }
            30% {
                width: 30%;
            }
            50% {
                width: 50%;
            }
            75% {
                width: 75%;
            }
            100% {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <!-- Brand Logo Section -->
        <div class="brand-logo">
            <img src="assets/cn_logo_full.webp" alt="Civil Networks Logo">
        </div>
        <div class="centered-logo">
            <img src="assets/scp-logo.png" alt="SCP Logo" class="scp-logo spinning">
        </div>
        <div class="container">
            <div class="header">
                <h1>Now Connecting to: SCP-RP UK</h1>
                <p class="subtext">“Secure. Contain. Protect.”</p>
            </div>
            <div class="loading">
                <p>Establishing Secure Connection...</p>
                <div class="loading-bar">
                    <div class="progress"></div>
                </div>
            </div>
            <div class="tips">
                <p>Did you know?</p>
                <p id="tips">Ventz isn't actually an old man?</p>
            </div>
        </div>
        <div class="footer">
            <p>Copyright © 2024 Civil Networks SCP-RP. All Rights Reserved.</p>
        </div>
    </div>

    <!-- Audio Controls -->
    <div class="audio-controls">
        <button id="play-sound">🔊 Play</button>
        <button id="pause-sound">⏸ Pause</button>
        <input type="range" id="volume-control" min="0" max="1" step="0.01" value="1">
    </div>

    <!-- Background Audio -->
    <audio id="background-audio" loop>
        <source src="https://raw.githubusercontent.com/McYeke/McYeke.github.io/main/assets/scp-ambient.mp3" type="audio/mpeg">
    </audio>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
